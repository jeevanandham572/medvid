<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEDVID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loading-screen" class="loading-screen" role="status" aria-live="polite">
      <div class="loading-content">
        <h2>MEDVID</h2>
        <p>Loading your workspace...</p>
      </div>
    </div>

    <main class="app-shell">
      <section class="auth-panel hidden panel" id="auth-card">
        <h2>WebDAV Login</h2>
        <p class="sub">Sign in to browse and stream files.</p>

        <form id="login-form">
          <label>
            WebDAV URL
            <input name="serverUrl" type="url" placeholder="https://example.com/remote.php/dav/files/user" value="https://dav.mypikpak.com" required />
          </label>
          <label>
            Username
            <input name="username" type="text" required />
          </label>
          <label>
            Password
            <input name="password" type="password" required />
          </label>
          <label>
            Base Path (optional)
            <input name="basePath" type="text" placeholder="/" value="/" />
          </label>
          <button type="submit">Login</button>
        </form>
        <p id="auth-message"></p>
      </section>

      <section id="explorer-card" class="explorer hidden">
        <aside class="panel rail">
          <div class="brand">
            <div class="brand-icon">▶</div>
            <div>
              <h1>MEDVID</h1>
              <p>File Explorer</p>
            </div>
          </div>

          <div class="rail-group">
            <p class="rail-label">Current Path</p>
            <p id="current-path" class="path-text">/</p>
          </div>

          <div class="rail-group">
            <p class="rail-label">Status</p>
            <p class="rail-status">Connected</p>
          </div>
        </aside>

        <section class="panel main-view">
          <header class="topbar">
            <form id="nav-form" class="nav-form" autocomplete="off">
              <div class="nav-actions">
                <button type="button" id="nav-back" class="nav-btn">◀</button>
                <button type="button" id="nav-forward" class="nav-btn">▶</button>
                <button type="button" id="nav-up" class="nav-btn">Up</button>
                <button type="button" id="nav-home" class="nav-btn">Home</button>
              </div>
              <div class="nav-path-wrap">
                <input id="nav-path-input" type="text" placeholder="/" />
                <button type="submit" class="go-btn">Go</button>
              </div>
            </form>
            <button id="logout-btn" class="logout-btn">Logout</button>
          </header>

          <div id="breadcrumb" class="breadcrumb"></div>

          <div class="collection-head">
            <h2 id="collection-title">Library</h2>
            <p id="collection-meta">0 items</p>
          </div>

          <div id="entry-grid" class="entry-grid"></div>

          <p id="explorer-message"></p>
        </section>

        <aside class="panel details-view">
          <h3>File Details</h3>
          <div class="detail-box">
            <p class="detail-label">Name</p>
            <p id="detail-name" class="detail-value">No item selected</p>
          </div>
          <div class="detail-grid">
            <div>
              <p class="detail-label">Type</p>
              <p id="detail-type" class="detail-value">-</p>
            </div>
            <div>
              <p class="detail-label">Size</p>
              <p id="detail-size" class="detail-value">-</p>
            </div>
            <div>
              <p class="detail-label">Modified</p>
              <p id="detail-modified" class="detail-value">-</p>
            </div>
            <div>
              <p class="detail-label">Path</p>
              <p id="detail-path" class="detail-value">-</p>
            </div>
          </div>
          <a id="detail-watch" class="detail-watch hidden" target="_blank" rel="noopener">Watch Video</a>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
